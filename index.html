<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>My AR Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    .instructions {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      background: rgba(0,0,0,0.65); color: #fff;
      padding: 10px 14px; border-radius: 8px; font-size: 14px;
      font-family: Arial, sans-serif; line-height: 1.6;
    }
    .capture-btn {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%); z-index: 10;
      background: white; border: none; border-radius: 50%;
      width: 70px; height: 70px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    .flash {
      position: fixed; inset: 0; background: white;
      z-index: 999; opacity: 0; pointer-events: none;
      transition: opacity 0.1s;
    }
    .reset-btn {
      position: fixed; bottom: 32px; right: 20px; z-index: 10;
      background: rgba(255,255,255,0.2); border: 2px solid white;
      color: white; border-radius: 8px; padding: 10px 14px;
      font-size: 13px; font-family: Arial, sans-serif; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="instructions">Drag — move<br>
    Pinch — scale<br>
    Twist — rotate</div>
  <button class="capture-btn" onclick="captureAR()"></button>
  <div class="flash" id="flash"></div>
  <button class="reset-btn" onclick="resetModel()">Reset</button>
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="preserveDrawingBuffer: true;">

    <a-marker type="pattern" url="pattern-Marker005.patt">
      <a-entity id="myModel"
        gltf-model="AlbionSauropodomorph_SHORTFACE_20220703_02.glb"
        animation-mixer="clip: *; loop: repeat"
        position="0 0 0"
        rotation="0.0 0.0 0.0"
        scale="1.00 1.00 1.00">
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // ── Touch controls ──
    let currentScale = 1.00;
    let currentRotY = 0, currentPosX = 0, currentPosZ = 0;
    const DEFAULT = { scale: 1.00, rotY: 0, posX: 0, posZ: 0 };
    let lastPinch = null, lastTwist = null, lastDX = null, lastDZ = null;

    const getModel = () => document.getElementById('myModel');

    function applyTransform() {
      const m = getModel();
      m.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
      m.setAttribute('rotation', `0 ${currentRotY} 0`);
      m.setAttribute('position', `${currentPosX} 0 ${currentPosZ}`);
    }

    function resetModel() {
      currentScale = DEFAULT.scale; currentRotY = DEFAULT.rotY;
      currentPosX = DEFAULT.posX;  currentPosZ  = DEFAULT.posZ;
      applyTransform();
    }

    const pinchDist = e => {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      return Math.sqrt(dx*dx + dy*dy);
    };

    const twistAngle = e => {
      const dx = e.touches[1].clientX - e.touches[0].clientX;
      const dy = e.touches[1].clientY - e.touches[0].clientY;
      return Math.atan2(dy, dx) * (180 / Math.PI);
    };

    document.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        lastPinch = pinchDist(e); lastTwist = twistAngle(e);
        lastDX = null; lastDZ = null;
      } else if (e.touches.length === 1) {
        lastDX = e.touches[0].clientX; lastDZ = e.touches[0].clientY;
      }
    });

    document.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 2) {
        const nd = pinchDist(e);
        if (lastPinch) currentScale = Math.min(Math.max(currentScale * (nd / lastPinch), 0.05), 15);
        lastPinch = nd;
        const na = twistAngle(e);
        if (lastTwist !== null) currentRotY += na - lastTwist;
        lastTwist = na;
      } else if (e.touches.length === 1 && lastDX !== null) {
        currentPosX += (e.touches[0].clientX - lastDX) * 0.005;
        currentPosZ += (e.touches[0].clientY - lastDZ) * 0.005;
        lastDX = e.touches[0].clientX; lastDZ = e.touches[0].clientY;
      }
      applyTransform();
    }, { passive: false });

    document.addEventListener('touchend', e => {
      if (e.touches.length < 2) { lastPinch = null; lastTwist = null; }
      if (e.touches.length === 0) { lastDX = null; lastDZ = null; }
    });
    // ── Capture button ──
    function captureAR() {
      const flash = document.getElementById('flash');
      flash.style.opacity = '1';
      setTimeout(() => flash.style.opacity = '0', 150);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const video     = document.querySelector('video');
          const arCanvas  = document.querySelector('a-scene').canvas;
          const output    = document.createElement('canvas');
          output.width    = arCanvas.width;
          output.height   = arCanvas.height;
          const ctx       = output.getContext('2d');
          ctx.drawImage(video, 0, 0, output.width, output.height);
          ctx.drawImage(arCanvas, 0, 0);
          const link      = document.createElement('a');
          link.download   = 'ar-capture.png';
          link.href       = output.toDataURL('image/png');
          link.click();
        });
      });
    }
  </script>
</body>
</html>
